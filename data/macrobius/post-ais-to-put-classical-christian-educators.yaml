  The Garage Band Revolution for Software Development is Coming

  I was trying to write a lab manual for a course on Context Engineering, and teach
  myself the subject at the same time (Rule #1 of teaching: You need to know more
  than the dog)

  As an example, I decided to use a ‘Wardley Map’ (some business school/project management
  thing) and in particular to make the AI simulate being a madlib generator for Mission
  Statements, like this one, built by Simon Wardley:

  At a later point in the process, I gave some of the output to Google’s NotebookLM
  (Gemini AI), and here’s what it thought I was trying to do:

  This document outlines student instructions for the Wardley-Toy Lab , a practical
  exercise focused on understanding and applying Wardley Maps for strategic visualization.
  Students learn about key concepts like markdown , prompts , and context engineering
  , which are crucial for effective interaction with AI systems . The lab’s learning
  objectives are structured using Bloom’s Taxonomy , guiding students through various
  cognitive levels from defining terms to designing lesson plans. The laboratory procedure
  involves hands-on exploration of the Wardley Toy web application and practical application
  of context and prompt engineering techniques to generate strategic content comparable
  to Wardley Map analysis . Ultimately, the lab aims for students to proficiently
  structure AI prompts, apply context engineering , and produce strategic insights
  while demonstrating an understanding of educational frameworks.

  I created a Markdown file–that’s a text file which is just what you are going to
  tell the AI (by typing a prompt), except since it is longer and you want to save
  it for repeated use, you save it, possibly with the extension .md if you are using
  a computer that needs ‘file extensions’ like that, or .md.txt to emphasize to the
  computer that it is a text file that you can read and edit without a special ‘Markdown
  editor’. [1]

  [1]: Later we will learn some markdown editors you can use, including an online
  web app for that.

  Markdown is a kind of Markup (there’s a pun there), like a copy editor or teacher
  would use to mark up a student’s paper or some copy to be printed in a newspaper.

  ‘Markdown’ is designed to be so non-intrusive you barely notice it. Software Developers
  use it for writing documentation like README files (then called README.md ) and
  since GenAI LLM’s (like chatGPT) are trained on lots of documentation found on the
  web, they see so much of it that you can consider

  MARKDOWN : the native language for talking to an AI, no matter what human language
  (English or Chinese) you use.

  So I created a file with some ideas I wanted to test related to Context Engineering,
  and on a whim just decided to paste the text into Claude Desktop and see what it
  made of that.

  Input to Claude prompt box: ownCloud

  You can read it if you like and try to guess what I was hoping for, but anyway it’s
  a start.

  It decided I wanted a document and offered me back a document with its thoughts.
  It provided the document for downloading in two forms… Markdown (of course), and
  PDF.

  Not exactly what I wanted, but a start to analyze how Claude is working

  A lot of ‘context engineering’ at this point is going to be trial and error. That
  means we have to experiment. When you experiment, you will have inputs and outputs–save
  them, using some system or other. I save them in folders

