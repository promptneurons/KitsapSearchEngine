title: AIs to put Classical Christian Educators (CCE) out of Work
url: https://macrobius.substack.com/p/ais-to-put-classical-christian-educators
date: '2025-07-30'
source: substack
op: 'Actually, educators in general are well positioned. You are probably well acquainted
  with writing ''Learning Objectives'', know what ''Scope and Sequence are'', and
  have used the term ''Bloom''s Taxonomy'' in anger. You are well positioned to train
  both humans and AIs.

  We’ve been through three ‘revolutions’ in the last two years, starting with ChatGPT
  awareness (November 2022), and then ‘Context Engineering’, and then ‘Agentic AI’.

  Artificial Intelligence, fundamentally, requires creating Training or Teaching Materials
  ( i.e., curriculum) for both humans and for AI. And the programming language is
  something Language Arts teachers know well: English.

  If you live and breathe ‘Scope and Sequence’ or can author ‘Learning Objectives’
  and know what ‘Bloom’s Taxonomy’ is, then this REVOLUTION is for you.

  There’s a lot going on here, and it’s happening very fast, so let’s dive in:

  Here’s some stuff Claude Desktop spit out in the course the following ‘Trip Report’

  I’m going to describe my very first attempt at ‘Context Engineering’ (attempting
  to not just chat with an AI or ask it questions like it’s a search engine, but ‘program
  it’ to give you the precise answer you want).

  One thing that’s true of interacting with AIs is you have to learn some thing all
  over again. You are probably

  In the next section, I will give you links to the various artifacts I used at each
  stage, so you can follow along and try doing what I did, and see if you get the
  same results.

