title: The Archdruid on Wagner, the Rheingold Blockchain, and Class Warfare
url: https://macrobius.substack.com/p/the-archdruid-on-wagner-the-rheingold
date: '2024-11-08'
source: substack
op: 'One of the important points he makes is that, similar to Tolkien’s Lord of the
  Rings, he argues that there is a political agenda behind the Ring Cycle (and Parsival
  ). He also detects that Tolkien’s Lord of the Rings (and the general legendarium)
  is an ANSWER to Wagner.

  Over target. Fabians? Socialism? Communists? You bet. Just read, mark, learn, and
  inwardly digest….

  I don''t think Michael John Greer (MJG - formerly of the ''Archdruid Report'') is
  wrong about this.  The historical facts are that Wagner had a close friendship with
  Bakunin, an appreciation of pre-Marxian Socialism from the Fourier era, and a stormy
  friendship with Nietzsche that was decisive for both men, if temporary.  Wagner
  was also a Schopenhauer respecter, like BAP.

  Without a doubt, the central issues of our times depend on the Ring Cycle .  There. 
  I said it.

  In this #noster #crustr poasting, I will give links to the full discussion of Wagner''s
  opus, with excursions into Socialism, Marxism, and well, Sanity.

  Let me start by linking the biweekly series, still in progress... I will add short
  comments on what content each link has. Expect discussion of Tolkien, and even the
  Alt-Right ahead.

  One of the moast important series of Blawgpoasts, of the 21st Century.

  The End of the European Age – Ecosophia (2022)

  The Nibelung’s Ring: Prelude – Ecosophia (biweekly, starting: July 2024)

  The Nibelung’s Ring: The Legends – Ecosophia

  The Nibelung’s Ring: The Rediscovery – Ecosophia

  The Nibelung’s Ring: The Politics – Ecosophia

  The Nibelung’s Ring: The Early Philosophy – Ecosophia (September 2024)

  The Nibelung’s Ring: The Rhinegold 2 – Ecosophia

  The Nibelung’s Ring: The Later Philosophy – Ecosophia

  The Nibelung’s Ring: The Rhinegold I – Ecosophia

  The Nibelung’s Ring: The Valkyrie 1 – Ecosophia (November 2024, with post-selection
  commentary)

  He''s part way into the Valkyries and will be finishing the final two installments
  of the Ring Cycle proper.  He says that the Lord of the Rings is a parody of Wagner,
  btw, and I can''t say he''s wrong about that.   I expect his discussion of Parsival
  will be Magnificent... Atomic... knowing his generation.

