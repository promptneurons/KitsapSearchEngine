title: The Law of God
url: https://macrobius.substack.com/p/the-law-of-god
date: '2025-07-06'
source: substack
op: 'I my last essay, I suggested the term ''Common Practice Period'' to describe
  educational practice in Britain and British America, in the period 1550-1850, and
  we took a brief look at the ''Classical Liberal Arts'' education of the American
  Founding Fathers.

  Today, I am going to start an examination of Liberal Arts education both before
  and after their time. It is well to remember that we are coming up on the Semi-quincentennial
  of the American Revolution of 1776 next year, which is to say, the 250th Anniversary.
  The Latin term means half of the last 500 years, so we might consider 1526, as our
  starting point, and 2026 our ending terminus , with the Founding Fathers lying exactly
  in the middle of that period, starting our survey in the early days of the Northern
  Renaissance and the Reformation, and ending with our own times.

  These two times have, as sorts of bookend, the rise of the printing press, and its
  age of Text, as well as in our time the rise of Artificial Intelligence, or AI,
  and the coming therefore of a NEW AGE OF TEXT.

  To be sure, of late years we have had much of Marshall McLuhan''s Global Village
  , and a rise of broadcasting in first audio then video, followed by streaming of
  the same oral/aural and visual media. However, this development was fueled by fossil
  fuels and the industrial civilisation and indeed revolution, brought on by the same.

  Surely, that episode of at most 250 years is drawing to its natural and inevitable
  close. What will follow I cannot say. First, however, we shall certainly see the
  decline of the streaming internet and its mobile appendages, and just as surely,
  with it some return to the culture of text, at least of the Usenet and BBS eras,
  which was more parsimonious of the resources of bandwidth, computing power, and
  disk space.

  Be that as it may, the story we are beginning in the middle may well inspire us--how
  to start from the political economy and material culture of the late Middle Ages,
  in Western Europe, and pass to global colonisation and the Liberty of 1776, primarily
  through education based on text, Starting from A World Lit Only By Fire .

  Beginning, as is the custom in the Classics, about the middle of things, in medias
  res , we might start with the sort of education described in the last piece, which
  is to say one divided into Dame-School or Petty-School, then Grammar School for
  the classical languages of Latin and Greek, and then on to College and University.

  (portrait of Rev. Thomas Dilworth, from frontispiece of his speller)

  In the text we were looking at, written on or about 1636 by one Charles Hoole, sometime
  schoolmaster of Rotherham Grammar School (which still exists), we see that before
  Grammar School one is prepared, perhaps in a Petty-School by:

  The whole Schoole [for boys aged 4 to 7] may not unfit­ly be divided into four formes;
  whereof the first and lowest should be of those that learn to know their letters,
  whose lessons may be in the Primar. The se­cond of those that learn to spell, whose
  lessons may be in the Single-Psalter. The third of these that learn to read, whose
  lessons may be in the Bible. The fourth of those that are exercised in reading,
  writeing, and casting accounts, whose lessons may be in such profitable Eng­glish-Books
  as the Parents can best pro­vide, and the Master think fittest to be taught.

  Mark carefully these stages and their books: 1. Learning your letters, out of the
  Primer; 2. Learning to Spell, possibly out of the ''Single-Psalter'' (a stand alone
  collection of the Psalms, in English); and 3. Learning to Read, that is, to read
  the Bible aloud as a Reader does at the Divine Liturgy, or Mass.

  Notice that the Speller comes before the Reader, even when, as later, books are
  more plentiful and separate ones are written especially for children. This seems
  backwards to us, who remember Dick and Jane, or the later 60s text with Tom, Betty,
  Sally, and (still) Spot. We started with look-say ''readers'' in First Grade, if
  we didn''t already know how to read from home, and Spelling came a year or so later
  and for many years thereafter, as a separate subject.

  There were, says Noah Webster, three different methods of teaching a child to read
  when he was writing (in the 1790s and early 1800s)... The Spelling Method, The Phonics
  Method, and the Look-Say Method. He is an advocate of Phonics, but is aware that
  the Spelling Method is the traditional one and still used by the bulk of teachers.
  It was, certainly, how all the Founding Fathers learned to read.

  Seeing a ''Speller'' through the lens of our mis-understanding, we are inclined
  to think it a list of words for learning proper orthography -- useful even in business
  schools for typists who might need to know how to hyphenate, and certainly how to
  spell some few ''difficult'' words. To us, it is the source of memorisation for
  a spelling bee, a contest suitable for the 5th or 6th year of our (now English-only)
  Grammar School, and not a book for a 5 or 6 year old child first learning to read
  English.

  Buckle up, Buttercup. We''re going for a ride. You will never look down on the lowly
  blue-back American Speller again, I assure you.

  We are going to plunge into the Spelling Book that inspired Noah Webster to begin
  his Revolution in both phonics and spelling, a subject we will return to later in
  this series of articles. But first, the backstory.

  Dilworth''s book was first published in 1740 and is well known, as the articles
  inform us, and noted by Charles Dickens, Oliver Goldsmith (the Canadian author from
  Nova Scotia and New Brunswick, not the famous Anglo-Irish author). The work, notably,
  was one of the few textbooks available to Abraham Lincoln for his self-education:

  Link to archive.org version

  Of the two links, the Google Books edition has the cleaner copy. Either the Archive
  and Google Books versions may be downloaded as PDFs for easier examination, which
  I recommend you do.

  A note about Abraham Lincoln is available in the Archive version:

  For those curious as to what else the young future President read:

  What Abraham Lincoln Read—An Evaluative and Annotated List

  For the curious, the reader praised by Lincoln was Lindley Murray''s English Reader
  [1799].

  But returning to Dilworth. Let us see the first sentences a young child would read
  -- single syllables of two or three letters, to begin with:

  Not quite Biblical of course, but very much in the spirit of Psalm 118/119, verse
  12: Psalm 119 KJV

  The name for the Bible, in the Middle Ages, Sacra Doctrina means Sacred or Holy
  Teaching . Doctrine is what a teacher and his disciple study together. What is contained
  in the Bible is God''s Law, which is the subject to be communicated by literacy.

  It is, thus, not mere coincidence, that ''The Law of God'' was the name of the textbook
  (a catechism if you will) for children in late Romanov Russia as well. Since it
  is so attested from the utter East to the utter West, it is the name we shall adopt
  for our Curriculum -- ''The Law of God Curriculum'', as will be explained in the
  Autodidact section of this Substack.

  Having established, then, that the order of teaching young children is to teach
  them their letters, first, out of the Primer , thence to give them a Speller (or
  some Psalms), and thence to Read, out of a Reader or the Bible -- we have established
  the unity of the Common Practice period from 1550 to 1850, from the time of Dean
  Colet, Sir Thomas More, and Erasmus, down to the education of the young Abe Lincoln.
  Indeed, the Spelling method of teaching, before use of a ''Reader'', is attested
  in the American South in the 1860s.

  We can see hints of all these stages, Primer then Speller and Grammar, then Reader,
  in Dilworth''s traditional book. But first, what is a Primer? The word, by the way,
  is pronounced ''primmer'' because it comes from the Latin Primarius (pri-MARE-ee-us),
  which has a short-i. The Primer, often spelled Prymer, was the first book a family
  might own, and the first printed book a less wealthy family might own, after the
  invention of the printing press in the West, by Gutenberg.

  The first press in England was that of William Caxton (Governour of the English
  Nation of Merchant Adventurers, a rival of the Hanseatic League in trade). Caxton
  introduced the press in 1476. It was around 50 years later that we see printed books
  for teaching English to children. Examples seem common from about 1525 or so onwards,
  hence our starting our discussion of (widespread) Liberal Education from thence.
  In a much later article, we will trace the Liberal Arts from Greek Scholasticism
  in mid 2nd century, well before Plotinus and Neo-Platonism even. However, books
  teaching the Seven or Ten Liberal Arts were always a very limited affair before
  the coming of the press made printed books commonplace.

  In the first portion of the 500 years of our history, a family would do well to
  have both a Prayer Book, which would be, soon enough, the protestant Book of Common
  Prayer , an English vernacular version of the medieval Prymer; as well as a Bible
  or more likely a Psalter and a (New) Testament, whether in Latin or English.

  As ''textbooks'' for children became a thing used in schools, they were still precious
  (and costly) items, so the children, up to 140 in a single school-room for Grammar
  Schools, supervised by the Master and the Usher, would have to share whatever the
  school''s benefactors and parents could provide in way of a library of school-books.

  The big change brought by this wealth of print books, of course, is that the children
  can become autodidacts as soon as they can read at all. This is why the Speller
  (or use of the Psalter, with an experience teacher), and the Spelling method, are
  so crucial. By the time a child is ready for the Reader he can read the Bible (in
  English and soon in Latin), and all of Divine and Humane literature is open to him,
  along with a Liberal Arts Education.

  It is very natural, of course, to teach the child prayers first, both at home and
  at Church, from the earliest age. The Primer is the beginning, because as soon as
  the ABCs are learned, the child can read in it the prayers he has already memorised
  through constant repetition, in the natural aural/oral way.

  The Book of Common Prayer, of course, contains not only the ''ordinary'' of the
  daily office and other prayers, but also a Psalter, the Readings from the Testament,
  and a catechism, as well as some instruction in the medieval subject of computus
  , the computation of the date of Easter! This leaves only a Writing-Master to teach
  penmanship and a Music-master, choir director, or Cantor wanting for a full clerical
  education, to which Grammar School was the gateway.

  We are, however, still back in the Petty-School (Primer-school, or Primary School),
  learning to read and write English, and such Grammar as we need to prepare for the
  Latin and Greek Grammar taught in Elementary School.

  We now examine the New England Primer, which was used from the earliest days of
  the Plymouth Colony, right down to the Disestablishment of the Puritan Church (Congregationalist
  and Presbyterian), in 1832 Massachusetts, in the waning years of the antebellum
  Republic, and of our Common Practice period.

  In any of these materials, from the 16th to 18th century, the Spelling Method is
  in view, just as described by Charles Hoole in 1636, a period just after Shakespeare,
  and before the beginning of the English Civil War. This method was used to accomplish
  what we now call ''teaching a child to read'', in these stages:

  First, the child of 3 or 4 is raised with prayers, also singing or saying of psalms,
  and perhaps Bible reading, in the home, if by literate parents. This same child
  is also churched, and frequently ''attends'' both Morning and Evening prayer (Matins
  and Vespers), likely on Saturdays and Sundays and possibly Wednesdays as well, all
  of which was the norm until the Edwardian era, and certainly in rural England.

  When the child shows interest in written books, he is taught his ABCs, by learning
  the names and shapes of the letters, singing ''the Alphabet song'', and possibly
  shown a set of traditional pictures such as those first two pages of the New-England
  primer, which were printed on the two sides of a ''horn book'' (to protect the precious
  paper from generations of children).

  The child is now called an Abecedarian, because he has mastered his ABCs.

  After passing through a process of reading vowels and consonants in single syllables,
  minutely described by both Hoole and Dilworth in the references given, he learns
  to ''Spell''. Eventually single sentences, with the words spelled, are introduced.
  The sentences are a mix of traditional material from the middle ages (when either
  ''Cato'' was used, or sometimes the book of Proverbs, to combine moral

  Spelling is what we call ''sounding the word out'', converting the magic runes to
  sound. First, by saying the name of the letters in sequence, then most essentially
  converting those letters to their SOUNDS, then sequencing the sounds.

  This may sound unimportant, but especially with boys, who are prone in a certain
  and constant percentage of the population to dyslexia and what we now call the ''autistic
  spectrum'', and the related attention-deficit hyperactivity disorder, it bridges
  their disability with what seems to us to be an insane amount of drilling the exact
  cause of difficulty (remembering the sequence long enough to ''code'' it phonically).
  This can be a critical success factor for children who are only somewhat disabled
  with Asperger''s syndrome, the mildest cases.

  Be that as it may, the method in any event worked well enough that it formed a future
  Shakespeare and a future Lincoln, and all the prose-authors and poets, philosophers
  and scientists, of the 17th and 18th centuries, and the Founding Fathers in between.

  Reading means what it means in Church: reading aloud the Epistle or Gospel or a
  Prophet (a passage from the books of the Old Testament), the office of a Reader
  or Deacon. Attention is given to pronunciation (diction), intonation, speaking clearly,
  and so forth, since reading is always primarily out loud (an e-locution), and a
  per-formance of speech.

  We don''t start children of 3 or 4 in primary school, and Charles Hoole gives the
  reason why: that age works in towns and cities, where the school (and the church)
  is close by. In rural areas, such as essentially all of America, this was delayed
  until 5 or 6, which we consider the proper age to begin ''First Grade''. The reason
  is that the child must be old enough to walk the distance to school, probably in
  the company of other children.

  Abraham Lincoln was rather older, when he ''taught himself to read'' with the aid
  of two spelling books and a reader, and a book of Aesop''s Fables. [The link lists
  the date of that edition as 1525, which means it was probably continuously reprinted
  in similar form, throughout our entire Common Practice period!]

  There is still more to the Petty-School (what we now call Primary school, or K-2)
  than the ABCs in a primer, a speller, and perhaps an introduction to a reader or
  Aesop''s Fables, all of which will be repeated in Grammar School.

  Namely, there is an introduction to English Grammar, or to Latin Grammar but giving
  the rules in English, rather than teaching Latin in Latin, which was the method
  of the Middle Ages (using the Ars Minor of Donatus, which books are called Donates
  in English), and also of the GRAMMAR School of the Common Practice.

  Next time, we will leave Petty-School behind, and find out what the Usher of the
  Grammar School has to teach us, as we proceed upon the way of the Law of God Curriculum.

