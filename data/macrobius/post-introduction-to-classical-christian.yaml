title: 'Introduction to Classical Christian Paideia: Preface'
url: https://macrobius.substack.com/p/introduction-to-classical-christian
date: '2025-06-04'
source: substack
op: 'The book you have in your hands is the outcome of my intent, a year ago, to write
  a ''Training Course'' for teachers of Classical Christian Education (CCE), and to
  provide student workbooks for first the Trivium, then the Quadrivium, so that by
  academic year 2025-2026, it would be possible for anyone who used the materials
  to start teaching Freshman Year of (American) High School, or Ninth Grade, then
  to add on, year by year until a full programme was available.[1]

  This plan ran into problems, as it very soon became evident that while there is
  a great deal of material available to classical educators on the Trivium, the Quadrivium
  materials extant in English are uniformly either poor, unsuitable for CCE, or offer
  problems unique to teaching the Quadrivium authentically in the tradition of classical
  education, and thus of the 7 Liberal Arts.

  A second lacuna that, while the Trivium (as revived in Dorothy Sayers essay, ''The
  Lost Tools of Learning'') has teaching materials for both Protestants and of course
  Catholics, there are no materials specifically for Orthodox Christians.

  I call these problems -- 1/ the problematic nature of the Quadrivium and 2/ the
  absence of Orthodox Christian CCE curricula -- ''the two gaps'' in contemporary
  Classical Christian Education.

  The two gaps are, in fact, related, and the upshot is invariably that when one creates
  a Classical Education curriculum, even for Christians, that handle Grammar, Logic,
  and Rhetoric in the traditional way, the designer has little choice but to turn
  around and toss in modernist treatments of Mathematics and Science. Dorothy Sayers
  put it well when she pointed out that no school could actually do what she was recommending!

  This semi-modernist approach has the further consequence of creating a Reactionary
  rather than Traditional education programme (at least for Christians), that cannot
  see back before the time-horizon of approximately 1820—just after the Napoleonic
  wars. This puts blinders on even to the American Revolutionary period and Early
  Republic, with its dependence on the Scottish Enlightenment and *Protestant* Scholasticism
  (yes, Virginia, there were Scottish Scholastic philosophers as well as a Scottish
  Enlightenment).

  We have lived in this mental prison for 200 years now. Whether you think the 17th
  and 18th century ''Enlightenment'' was a good thing or a bad thing, there is no
  question it was hijacked and redirected, consciously, in the mid-19th century, which
  is the Romantic period not the Classical period—a fact evident in Western Music,
  Art, Architecture, Literature, and indeed in Philosophy, Mathematics, and Science.

  We are thus left with ''Lost Tools'' that REMAIN lost to us.[2]

  [2]: The Quadrivium: The Lost tools of STEM

  Confronting the role of Modern Science and Mathematics, and the nature of Modernist
  technology, brings into focus the *real* fight, which is between Tradition (and
  Christianity) and against the Modern World.

  Even as late as the mid 20th century, the Third Scholastic in the Roman Catholic
  Church (itself a revival the Aristotelian-Aquinas philosophy of Western, Latin,
  Scholasticism) pretty much brought a progressive and optimistic attitude towards
  science and technology, and condemned neither in a compelling way, much less effectively.

  Thus, even if your goal were simply, as a Traditional Catholic, to accept the teaching
  of Pope Leo XIII in the encyclical Aeterni Patris and what came of it, and teach
  the Classical Liberal arts in the usual way as a propaedeutic to Christian Philosophy
  (meaning here Scholasticism), you would expect more engagement with Modern Science,
  probably negative engagement, than the mid-20th century disputants found in their
  hearts to do.

  I thus propose, as an Orthodox Christian and CCE educator, to not only restore moderate
  realism (what Garrigou-Lagrange calls conceptual realism in his Third-,Scholastic
  era monograph Common Sense Realism ), but to do so vigorously, in a way that pits
  Tradition against Modernity.

  The theme of the Traditional Way vs the Modern Way is a very old one, and in the
  West, in Scholasticism, where it is known as the via antiqua vs the via moderna
  . Yes, ''The Modern World'' in the sense used by Classically Educated Christians,
  began around the year 1400 and so we have in some sense been Moderns , in the West,
  for at least 600 years and then some, quite possibly up to full millennium—part
  of the reason that Modern Science, Nominalism, and Materialism are so ingrained
  in our Western way of thinking.

  In the 20th century and now the 21st, the Traditionalist school of metaphysics—and
  here I am referring the word in the sense of Rene Guenon, and later Julius Evola,
  sometimes also called the Perennialist school—has had a few Orthodox Christian adherents,
  notably the Russian philosopher Alexander Dugin, and Phillip Sherrard, known best
  as one of the translators of the Philokalia (an Orthodox Christian collection of
  monastic writings) into English and author of Christianity: Lineaments of a Sacred
  Tradition , and as a third, less notably, myself.

  Orthodox Christian reception of Traditionalist metaphysics ranges from a fairly
  full acceptance of Guenon (who later became a Muslim Sufi) to severe condemnation.
  A.G. Dugin takes Guenon''s views as central to his philosophy, while acknowledging
  both that Guenon''s ''Traditionalism'' is a fairly modern construct, and that it
  should be received critically, not as imparting Holy Tradition directly.

  Sherrard, in comparison, has chapters critical of Guenon, and (the transparently
  Gnostic) Carl Jung, in his Sacred Tradition book, but nonetheless is of the Traditionalist
  school. Both Dugin and Sherrar equate the belief, in Traditionalist metaphysics,
  in a perennial and initiatory Tradition, and spiritual illumination (gnosis) to
  baptism in the Orthodox Church—as indeed they must aver, being Orthodox Christians.
  Sherrard remains a Traditionalist but with reference to the writings of St Gregory
  Palamas, which he uses as the sound basis for his critique of the Modern World,
  and his dire predictions of Ecology under the heel of Modernism and Technology.

  A third Orthodox Christian, Father Seraphim Rose, who is not a Traditionalist now,
  was famously a follower or at least avid reader of Guenon before becoming Orthodox.
  Subsequently, he rejected the Perennialist school quite sharply, I believe, though
  I do not have citations for you on that.

  My position as a Traditionalist, by the way, is very close to Sherrard''s, in the
  sense that I am somewhere between A.G. Dugin and Father Seraphim Rose on the matter,
  and concur on the importance of both Ecological disaster and Anthropogenic Global
  Warming in the potential destruction of God''s Creation, as well as Sherrard’s use
  St Gregory Palamas'' views, as applied to his crtique of Modern Science and Technics
  (i.e., ''Globalist'' technological society).

  My reason for this long excursion into obscure 20th century metaphysics is to get
  back to my claim that Classical Education in the Liberal Arts, and the Quadrivium
  in particular, are broken in the Latin West, and can only be repaired by Orthodox
  Christians, with the consequence that Modern, Western, Science will thereby be undermined.
  The situation between Tradition and Religion, on the one hand, vs Modern Science,
  on the other, will remain unresolved in our actual societies and polities, until
  Orthodox Christians speak out on the matter.

  (In particular, I will defend the thesis that Quantum Mechanics is an attempt by
  Modern Science to frame something capable of replacing Neo-Platonism, in its empiricist,
  nominalist, materialist, and sometimes atheist metaphysical framework. This is an
  advanced discussion, however, and not part of the pedagogy of children or even adults
  before they are fully trained in Philosophy and the Sciences!)

  As A.G. Dugin points out, Aristotle and Plato are two pillars of the (Perennial)
  Tradition. The Third Scholastic project of ''adding back in Aristotle'' in the form
  of the Latin Scholasticism of Aquinas, is not enough. One must also reckon with
  the Platonic Philosophy which supports it.

  To fail to do so is to reject the Classical Liberal Arts tradition, and the foundation
  of Western, Latin Scholasticism—and incidentally, the Greek Scholasticism of Byzantine
  Education as well—on the grounds that Platonism, and especially Neo-Platonism, must
  be everywhere exorcised from Philosophy and especially from Science, in favour of
  the empirical, the material, and the phenomenal.

  There is plenty of ''Neo-Platonism'' in Aquinas, via St Dionysios the Areopagite
  (sometimes called by scholars pseudo-Dionysios), and also the Liber de Causis ,
  which was thought at the time to be an Aristotelian text but is in fact is based
  on a work by Proclus, a Neo-Platonist.

  Some have gone so far as to propose ''correcting'' Aquinas by removing these Platonic
  influences on his philosophy!

  It helps to see where Aristotle was going with his physics—writers of the Third
  Scholastic explain Aristotle as trying to reconcile and preserve both the metaphysics
  of Parmenides (and Plato''s Forms) and the physics of Democritus, the Atomist and
  Materialist.

  That is, ''moderate Realism'' combined Formalism (referring to Plato''s Forms),
  with the Materialist explanations of the Pre-Socratic philosophers. Thus hyle (Matter)
  + morphos (‘form’, or ‘shape’) leads to hylomorphism as a metaphysical theory.

  Aristotle without Plato is just materialism, and in particular the materialism of
  Democritus. If you know a bit about Classical Latin poetry, you''ve heard of Lucretius,
  and his (Epicurean) poem De Rerum Natura . It was a very popular text in the early
  19th century, as there was renewed interest in both the materialist Atomism of Democritus
  and, following the Utilitarian philosophy of Jeremy Bentham, in the philosophy of
  the Epicurean school.

  In short, to restore the Aristotelian Pillar, and excise anything Platonic or Neo-Platonic,
  leaves us a Classical Liberal Arts education without the Quadrivium, and an Aristotle
  who is a thinly disguised ''Liberal Democrat'' of the 19th century stamp. We are
  left with mere materialism for our physics and utilitarianism more our moral philosophy,
  rather than Aristotle''s actual moderate realist hylomorphism, and Virtue Ethics
  underpinning his political philosophy.

  And worse, we have a project of trying to put Modern Science (Dialectical Materialism
  really) in the mouth of Aquinas, with thealleged full backing of the Roman Catholic
  Church.

  What can help avoid this trap (for the West, Catholics and Protestants alike), is
  for Orthodox Christians to bring up *their* parallel use of the Classical Liberal
  Arts and history of Greek Scholasticism.

  Latin Scholasticism is usually dated from the 11th or 12th centuries. It followed
  on nearly a millennium of Greek Scholasticism, which can be dated from the 2nd century,
  well into the pagan period of philosophy, and two centuries before the Emperor Constantine
  tolerated Christians or built Byzantium. In Greek Scholasticism, Aristotle is used
  for the introductory lessons in philosophy, followed by mathematics ( i.e. , the
  Quadrivium) as an introduction to Plato and Neo-Platonism.

  Thus, it is easy to see why this notion of a new and improved version of Aristotle
  and Aquinas is quite harmful to Classical Christian Education. The Classical Liberal
  Arts as a teaching tradition have a continuous record of use for over 1800 years,
  in both the Eastern Roman Empire (later Byzantium) and in the West. The major portion
  of it, throughout that time, is mostly as a propaedeutic to Platonism, i.e. the
  Neo-Platonic philosophy. If you ''kick out'' Plato, neither Aristotle nor the Quadrivium
  and Mathematics, at the very least, make sense anymore.

  How can an Orthodox Christian even consent this Liberal Arts proposal of CCE, given
  that it relies on either Aristotle alone, or the pagan philosophy of Plato and the
  Neo-Platonists?

  To answer that, we only need to look at how education was actually ''done'' in Byzantium.
  Both parts of the Roman Empire routinely adopted the approach that first appeared
  in the Platonic schools. That is, secular philosophic education for both Christians
  and Gentiles (pre-Christian Greek and Roman) education used the same texts, in the
  same order. There was plenty of back-and-forth exchange, whenever the Western Empire
  was capable of it, and parallel movements as both halves of the empire reacted to
  developments in the other half. The two traditions of Scholasticism are continuous
  in time and in substantial agreement as to pedagogy leading from a similar sequence
  of the Classical Liberal Arts to secular philosophy.

  St Gregory Palamas, late in the span of the Byzantine Empire, makes an entirely
  unremarkable distinction that describes ''how it was done''. He distinguishes between
  what he calls esothen philosophia and exothen philosophia. The first is /our/ (Christian)
  philosophy, which is the doctrinal tradition found in the Scriptures and the Liturgy
  of the Church, imparted by catechesis and by participating in worship, along with
  instruction given by the Ecclesiastical Hierarchy. The second is /their/ (pagan)
  philosophy, which can be rightly or wrongly used by Christians, but, so far as it
  is rightly used, serves useful purposes.

  Secular philosophy is the object of Secular education, and without the Christian
  education imparted to the laos (People of the New Israel and the New Covenant, the
  Church), secular education would be dangerous (and St Gregory Palamas uses the Greek
  word for ''vain'' here for that philosophic outcome). [3]

  [3]: Kata Christon, Mataia, and Physikē Philosophia in Gregory Palamas’s 14th Century
  Byzantine Philosophy of Education

  Modern Science is pretty close to a wrong use of otherwise useful secular teaching,
  which turns ''outsider'' philosophy (meaning science) into ''vain'' philosophy/science.

  Only properly transmitted Tradition of the Church, imparted by initiation (catechesis)
  and illumination (baptism), can correct the situation of the Modern World, at the
  ecological and political and, honestly, at even the biological, chemical, and physical
  levels.

  All of Creation (the entire visible Universe, not just the Earth) is fallen, in
  the First Adam; and it is only with the work of the Church and Salvation in Jesus
  Christ, who links Earth to (Noetic) Heaven, and the sanctification of the Life-Giving
  Holy Spirit, that our situation can be changed from vain ( i.e. , empty, useless,
  harmful) Science, to True Spiritual Knowledge.

