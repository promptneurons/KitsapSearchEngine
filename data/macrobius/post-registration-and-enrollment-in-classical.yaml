title: Registration and Enrollment in Classical Education Courses 2025-2026
url: https://macrobius.substack.com/p/registration-and-enrollment-in-classical
date: '2025-09-06'
source: substack
op: 'The easiest way to register and enroll is to upgrade to a paid subscription.
  This will get you instructions and access you need to TAKE any courses.

  The reason for two steps, both registration and enrollment, is because the mailing
  volume of daily lesson plans for all courses offered across all grades (K-12) would
  swamp anyone’s inbox!

  Mailing List archive pages will be provided, so you don’t need to register or enroll
  just to ‘examine all the materials’. Just ask me (at the above address) where the
  archives are, or wait for links in the paid Autodidacts publication section here.

  Enrolling is for persons who want to do self-paced learning.

