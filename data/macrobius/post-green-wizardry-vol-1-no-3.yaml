title: Green Wizardry, Vol. 1, No. 3
url: https://macrobius.substack.com/p/green-wizardry-vol-1-no-3
date: '2025-07-23'
source: substack
op: 'In the interests of providing ‘a variety of opinions’ I’ve added two naysayer
  articles to complement the AMOC doom ones.

  Extreme Power Plant Fear Mongering – Watts Up With That?

  I’m not particularly impressed with the two articles by Watts — they both do cite
  interesting articles from Jan 2025 / Feb 2025 Nature but one should just go read
  those I think. I’ll link in a second. Blathering about how bad models are then backing
  your point up with links to meta-analysis by the CMIP6 committee, comparing 24 different
  coupled ESM models, because you know your readers won’t bother to actually read
  the evidence and accept your knuckle-drag simplistic take at face value… we’ll I
  won’t say it won’t build you readership for your Denial Grift but … um…

  Atlantic overturning inferred from air-sea heat fluxes indicates no decline since
  the 1960s | Nature Communications (Jan 2025)

  Continued Atlantic overturning circulation even under climate extremes | Nature
  (Feb 2025)

  Preface to an interesting Orthodox Christian take on the ecological crisis as rooted
  in the desacralization of Nature (a theme that Sherrard as a Traditionalist, though
  with his differences from Guenon due to being an Eastern Orthodox Christian, he
  takes from that school) — and intro to his work:

  One thing we no longer need to be told is that we are in the throes of a crisis
  of the most appalling dimensions. We tend to call this crisis the ecological crisis,
  and this is a fair description in so far as its effects are manifest in the ecological
  sphere. For here the message is quite clear: our entire way of life is humanly and
  environmentally suicidal, and unless we change it radically there is no way in which
  we can avoid catastrophe. Without such change the whole adventure of civilization
  will come to an end during the lifetime of many now living.

  Sherrard, Nasr, Dugin make an interesting succession of Traditionalists on this
  topic.

  My comments on the latest from Greer:

  Next Intermezzo on Parsifal up,

  For those who missed his series on KEK:

  For those who don’t understand the ‘esoteric take’ — he’s using Wagner’s opera to
  describe the Trump / Musk / RFKjr admin.

  Artistry is Technics, in Greek.

