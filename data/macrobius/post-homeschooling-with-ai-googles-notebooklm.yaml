title: 'Homeschooling with AI: Google''s NotebookLM'
url: https://macrobius.substack.com/p/homeschooling-with-ai-googles-notebooklm
date: '2025-06-09'
source: substack
op: 'You can upload a document (currently only text, markdown, or PDF, or via a web
  URL link) and it will generate a summary of the document and let you ask questions
  of it. Then you can share out the link to the notebook, which is a bundle of the
  original doc and any ‘notes’ you took on it.

  As you can see, I uploaded last years 58pp. draft of the training course, and made
  it

  Here are some things you can ask it to summarize for you (just type the text, not
  the curly braces}

  {how can I learn the trivium?}

  {who was sister miriam joseph?}

  You can also, if you own the notebook or have edit access to it, generate a ‘study
  guide’ which will summarize and then prepare a quiz on the material to test understanding.

  I don’t think it will take long for students to figure out they can ask actual test
  questions of the text book and let the AI do the research of course. There is that
  aspect of this technology to consider. However, for Autodidacts and homeschool teachers,
  being able to summarise curriculum and make study plans out of it is reasonable.

  Obviously, for larger research projects, you can dump all your materials into such
  a notebook (for example, the references for a paper you are writing) and have very
  easy access to cross-linking your notes, and finding connections in them you might
  not have noticed yourself.

  This technology makes learning Markdown for note taking an important skill for future-proofing
  your or your child’s education (a method for adding a few symbols to plain text
  to make it hyperlinked and incidentally readable by AI). Markdown is pretty much
  the native language for AI prompting, and they all pretty much will read it or write
  it, even without asking.

  I will cover ‘markdown’ and how to use it in future articles and in fact in the
  curriculum being developed. But here’s a preview — a note-taking method called Zettelkasten[1]
  (Zettle, an index card; kasten, a file drawer):

  [1]: Zettelkasten: The Ultimate Guide for 2025 | by Theo James | Medium

