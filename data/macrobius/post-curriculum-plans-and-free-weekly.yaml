title: Curriculum Plans and Free Weekly Newsletter
url: https://macrobius.substack.com/p/curriculum-plans-and-free-weekly
date: '2025-05-31'
source: substack
op: 'It is simple to turn off ‘the firehose’ (coming soon…) —

  You will still receive the new, free weekly newsletter, The Autodidact. If you don’t
  want that, you can opt-out on the same page.

  Here are the curriculum plans and below the steps you have to do to opt into things
  you may not already have:

  Do you see the problem… what if you DON’T have a 4th Grade child you would like
  to learn Greek? Why is this even in your in-box?

  This problem is called ‘market segmentation’ - people differ by whether they have
  children, what ages, homeschooled or not, interest in classical languages, how much
  preparation they or their children have had when they ‘jump into’ Classical Christian
  Education (CCE), and for adult learners, their tolerance for technical (STEM) subjects.

  The main home page of The Saturnalia is focused on the Trivium and Quadrivium. But
  the curriculum developed needs to include rather more than that! The home page also
  includes discussion of the American Founding Fathers, education in Colonial times,
  the Early Republic, and the enduring influence of the Scottish Enlightenment and
  Classical Liberalism, as well as discussion of Thomism (the Scholastic philosophy
  of St Thomas Aquinas), and Aristotle!

  That’s enough for the Free Subscription to the Saturnalia. But what about individual
  subjects and their curriculum materials?

  The Grammarian Plan is targeted for people with children in the ‘Grammar Phase’
  (American grades K-4 or ages 5-9). It’s not currently offered, but planned, and
  preview materials will be part of the ‘paid subscription’.

  The Dialectician Plan is similar to the home page, which is for parents and teachers
  of ‘Rhetoric Phase’ children, except that it targets slightly younger children,
  American grades 5-8, or ‘Dialectic Phase’. The paid plan allows inclusion of materials
  for Latin and Greek, and optionally Logic.

  The Autodidact Plan is for adult learners who which to customize the exact subjects
  they are learning. It doesn’t have paid subscription material syndicated through
  Substack, but to opt-in you will need to go to another site (a Mail Chimp landing
  page), and it will be delivered only by email. This will be described future numbers
  of The Autodidact Weekly Newsletter .

