title: Free Classical Education Courses Coming 2025-2026
url: https://macrobius.substack.com/p/free-classical-education-courses
date: '2025-08-12'
source: substack
op: 'I''ll get to the classical language offerings in a moment but first a recap:
  last year we focused on the scope and sequence for American Grade 9 only, and creating
  both teacher manuals and student manuals, for the start of ''Rhetoric Phase''

  This year, we will be adding to that, another draft, as well as American 5th Grade
  (the start of ''Dialectic'' or what Dorothy Sayers calls the ''Pert'' stage). Thus,
  by the end of this year we will have 5th and 9th grade complete for future years,
  then the next year add 6th and 10th and so forth, until all of 5th-12th grade (ages
  10/11 up to 18) are complete.

  The three courses on offer will be self-paced (you read a book and an answer key
  is available). Our materials are linked to the books and offer further elaboration
  and background, since our society has forgotten what Classical Education in the
  early modern era, what the Founding Fathers knew and grew up with, looks like—despite
  its now forgotten 350 year run in the English-speaking world up until about the
  mid-19th century.

  The English-speaking version of a Classical Liberal Arts education previously meant
  learning both Latin and Greek. Some might find the emphasis on Greek a bit surprising,
  but to Protestant Reformers, the ability to read the Bible and the Church Fathers
  of the first few centuries, as well as a more general participation in the Renaissance
  and Humanist re-discovery of the Latin and Greek classics, created a now all-but-forgotten
  tradition of learning Latin, from 1st or 2nd grade, and then introducing Greek in
  late 4th or 5th grade.

  But why, you might ask, Homeric Greek first? Greek has several dialects and we will
  go over the pros and cons of starting with each of them. Materials need to be prepared
  for each of the dialects studied, eventually, and I''m simply starting with this
  one, because it is the *least* familiar to me personally, and I will be learning
  it alongside you, rather than ''teaching'' you!

  Starting with Koine in 4th or 5th grade is of course quite feasible, especially
  if your parish is a Greek Orthodox one, and the language is already somewhat familiar,
  from the services and iconography, and some at least of the parish speak Demotic
  (Modern) Greek in the home. In such a setting, there likely already *is* a Greek
  School and a Greek teacher, training children from the appropriate age to become
  readers and cantors and choir members in the future.

  In such a favourable case, however, and even more so, at the height of the Byzantine
  Empire, Christian Classical Education has always begun the ''Gymnasium'' years,
  the ones with the most intensive study of Grammar, with memorizing large swaths
  of Homer, since most of the Liturgy and the Psalms are well along in memory by then.
  The last person documented to have memorised Homer, the Psalms, and the New Testament
  Gospels, all in Greek of course, was St Nicodemus of the Holy Mountain, who compiled
  and edited the _Philokalia_, in our current edition.

  All three courses this year, the Trivium/Quadrivium one, and Latin 1 and Homeric
  Greek 1, will start the week of September 1 (on the New Calendar, i.e. the normal
  secular one) and continue for 20 weeks, doubtless breaking for the holidays as needed.

  This time round, correspondence with me or for those wanting it, two class meetings
  twice a week for up to 4 persons at a time, will be offered, at least until I decide
  my schedule can''t take more groups. This is the classical way of doing things --
  a ''one room virtual schoolhouse'' with classes ''forming up'' a few scholars at
  a time, as people enroll. No additional charge or anything like that for the in-person
  classes, at least this year. We need as many CCE educators out there as possible,
  especially homeschooling parents who are learning the classics so they can teach
  *their* children and quite possibly others in their homeschooling group.

  We try to time mailings for the next week over the weekend, so watch this space
  during the next few weeks for detailed instructions, if you wish to participate
  or just want the materials produced!

